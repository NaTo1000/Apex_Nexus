<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Nexus - Crypto Trading Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>⚡ Apex Nexus</h1>
                <p class="tagline">Professional Crypto Trading Platform</p>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userBalance">Balance: $10,000</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Auth Forms -->
        <div id="authSection" class="auth-section">
            <div class="auth-container">
                <h2>Welcome to Apex Nexus</h2>
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showLogin()">Login</button>
                    <button class="tab-btn" onclick="showRegister()">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                    <div id="registerError" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Trading Dashboard -->
        <div id="tradingSection" class="trading-section" style="display: none;">
            <!-- Market Overview -->
            <section class="market-section">
                <h2>Market Overview</h2>
                <div id="marketPrices" class="market-grid"></div>
            </section>

            <!-- Trading Interface -->
            <section class="trading-interface">
                <div class="trade-panels">
                    <!-- Buy Panel -->
                    <div class="trade-panel">
                        <h3>Buy Crypto</h3>
                        <form id="buyForm" class="trade-form">
                            <div class="form-group">
                                <label>Symbol</label>
                                <select id="buySymbol" required>
                                    <option value="BTC">Bitcoin (BTC)</option>
                                    <option value="ETH">Ethereum (ETH)</option>
                                    <option value="BNB">Binance Coin (BNB)</option>
                                    <option value="SOL">Solana (SOL)</option>
                                    <option value="ADA">Cardano (ADA)</option>
                                    <option value="XRP">Ripple (XRP)</option>
                                    <option value="DOT">Polkadot (DOT)</option>
                                    <option value="DOGE">Dogecoin (DOGE)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" id="buyAmount" step="0.001" min="0.001" required>
                            </div>
                            <div class="form-group">
                                <label>Price (USD)</label>
                                <input type="number" id="buyPrice" step="0.01" min="0.01" required>
                            </div>
                            <div class="total-display">
                                Total: $<span id="buyTotal">0.00</span>
                            </div>
                            <button type="submit" class="btn-buy">Buy</button>
                            <div id="buyError" class="error-message"></div>
                        </form>
                    </div>

                    <!-- Sell Panel -->
                    <div class="trade-panel">
                        <h3>Sell Crypto</h3>
                        <form id="sellForm" class="trade-form">
                            <div class="form-group">
                                <label>Symbol</label>
                                <select id="sellSymbol" required>
                                    <option value="BTC">Bitcoin (BTC)</option>
                                    <option value="ETH">Ethereum (ETH)</option>
                                    <option value="BNB">Binance Coin (BNB)</option>
                                    <option value="SOL">Solana (SOL)</option>
                                    <option value="ADA">Cardano (ADA)</option>
                                    <option value="XRP">Ripple (XRP)</option>
                                    <option value="DOT">Polkadot (DOT)</option>
                                    <option value="DOGE">Dogecoin (DOGE)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" id="sellAmount" step="0.001" min="0.001" required>
                            </div>
                            <div class="form-group">
                                <label>Price (USD)</label>
                                <input type="number" id="sellPrice" step="0.01" min="0.01" required>
                            </div>
                            <div class="total-display">
                                Total: $<span id="sellTotal">0.00</span>
                            </div>
                            <button type="submit" class="btn-sell">Sell</button>
                            <div id="sellError" class="error-message"></div>
                        </form>
                    </div>
                </div>
            </section>

            <!-- Portfolio -->
            <section class="portfolio-section">
                <h2>Your Portfolio</h2>
                <div id="portfolioContent" class="portfolio-content"></div>
            </section>

            <!-- Trade History -->
            <section class="history-section">
                <h2>Trade History</h2>
                <div id="tradeHistory" class="trade-history"></div>
            </section>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
